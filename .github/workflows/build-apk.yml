name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libtinfo5 \
            build-essential ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build APK
        run: |
          # 先运行一次 buildozer 让它下载 SDK，然后接受许可证
          buildozer android debug 2>&1 | tee build.log || true
          
          # 检查是否需要接受许可证
          if grep -q "license is not accepted" build.log; then
            echo "Accepting SDK licenses..."
            # 找到 sdkmanager 并接受许可证
            SDKMANAGER=$(find ~/.buildozer -name sdkmanager -type f 2>/dev/null | head -1)
            if [ -n "$SDKMANAGER" ]; then
              yes | $SDKMANAGER --licenses
            fi
            # 重新打包
            buildozer android debug
          fi
        env:
          ANDROIDSDK: ~/.buildozer/android/platform/android-sdk
          ANDROIDNDK: ~/.buildozer/android/platform/android-ndk-r25b

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-monitor-debug
          path: bin/*.apk
          retention-days: 30
