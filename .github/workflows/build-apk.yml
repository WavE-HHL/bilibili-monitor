name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libtinfo5 \
            build-essential ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform/android-sdk/build-tools
          key: buildozer-v3-${{ hashFiles('buildozer.spec') }}

      - name: Build APK with retries
        run: |
          # 第一次尝试（可能会因许可证失败，但 SDK 会下载好）
          buildozer android debug || true
          
          # 检查 APK 是否生成
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "APK built successfully!"
            exit 0
          fi
          
          # 接受许可证后重试
          echo "Retrying after accepting licenses..."
          SDK_DIR=$(find ~/.buildozer -type d -name "android-sdk" 2>/dev/null | head -1)
          if [ -n "$SDK_DIR" ]; then
            mkdir -p $SDK_DIR/licenses
            echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_DIR/licenses/android-sdk-license
            echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $SDK_DIR/licenses/android-sdk-license
            echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $SDK_DIR/licenses/android-sdk-license
          fi
          
          buildozer android debug
        env:
          ANDROIDSDK: ~/.buildozer/android/platform/android-sdk
          ANDROIDNDK: ~/.buildozer/android/platform/android-ndk-r25b

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-monitor-debug
          path: bin/*.apk
          retention-days: 30

