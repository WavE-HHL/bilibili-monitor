name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动在网页上点击触发

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装系统依赖（Buildozer 需要）
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libtinfo5 \
            build-essential ccache

      # 4. 安装 Buildozer 和 Cython
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # 5. 缓存 Buildozer 的 SDK/NDK（避免每次重复下载）
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      # 6. 执行打包
      - name: Build APK
        run: |
          buildozer android debug
        env:
          ANDROIDSDK: ~/.buildozer/android/platform/android-sdk
          ANDROIDNDK: ~/.buildozer/android/platform/android-ndk-r25b

      # 7. 上传 APK 为 Artifact（30天内可下载）
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-monitor-debug
          path: bin/*.apk
          retention-days: 30

      # 8. 如果是 tag 发布，自动创建 Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
