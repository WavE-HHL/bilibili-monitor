name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libtinfo5 \
            build-essential ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # 暂时禁用缓存，确保许可证被正确接受
      # - name: Cache Buildozer global dir
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.buildozer
      #     key: buildozer-v2-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          # 使用 expect 自动回答 yes 接受许可证
          sudo apt-get install -y expect
          expect -c '
            spawn buildozer android debug
            expect {
              "Accept? (y/N):" { send "y\r"; exp_continue }
              "Accept? (y/n):" { send "y\r"; exp_continue }
              eof
            }
          '
        env:
          ANDROIDSDK: ~/.buildozer/android/platform/android-sdk
          ANDROIDNDK: ~/.buildozer/android/platform/android-ndk-r25b

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-monitor-debug
          path: bin/*.apk
          retention-days: 30
